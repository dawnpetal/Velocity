<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocity</title>
  <style>
    @font-face { font-family: "JB"; font-weight: 400; src: url("../fonts/JetBrainsMono-Regular.woff2") format("woff2"); }
    @font-face { font-family: "JB"; font-weight: 500; src: url("../fonts/JetBrainsMono-Medium.woff2") format("woff2"); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

    :root {
      --sans: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
      --mono: "JB", ui-monospace, monospace;
      --bg: #050505;
      --panel: #0a0a0a;
      --card: #111111;
      --border: rgba(255, 255, 255, 0.04);
      --border-hi: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-dim: #888888;
      --text-mute: #444444;
      --warn: #f59e0b;
      --ease: cubic-bezier(0.2, 1, 0.2, 1);
    }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: var(--sans);
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      background: var(--bg);
      border: 1px solid var(--border-hi);
      border-radius: 14px;
      overflow: hidden;
    }

    #key-section {
      padding: 16px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #key-section.hidden { display: none; }

    .key-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .key-info { display: flex; flex-direction: column; gap: 2px; }
    .lbl { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--text-mute); letter-spacing: 0.05em; }
    .val { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
    .sub { font-size: 10px; color: var(--text-dim); }

    .rings { display: flex; gap: 8px; }
    .ring-box { position: relative; width: 36px; height: 36px; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
    .ring-box svg { width: 100%; height: 100%; transform: rotate(-90deg); padding: 4px; }
    .ring-track { fill: none; stroke: var(--border); stroke-width: 4; }
    .ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; stroke: var(--text-dim); transition: 0.6s var(--ease); }
    .ring-fill.warn { stroke: var(--warn); }
    .ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: var(--text); }

    .key-actions { display: flex; gap: 6px; }
    #key-display { 
      flex: 1; background: var(--card); border: 1px solid var(--border);
      padding: 8px 12px; border-radius: 8px; font-family: var(--mono);
      font-size: 10px; color: var(--text-mute); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; line-height: 14px;
    }
    .act-btn {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      background: var(--card); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 8px; cursor: pointer; transition: 0.2s var(--ease);
    }
    .act-btn:hover:not(:disabled) { border-color: var(--text-dim); color: var(--text); background: var(--panel); }
    .act-btn:disabled { opacity: 0.4; cursor: default; }
    .act-btn svg { width: 14px; height: 14px; }
    
    .spinning svg { animation: spin 0.8s infinite linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #search-container { padding: 12px 12px 4px; position: relative; }
    #search-input {
      width: 100%; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; font-size: 13px;
      color: var(--text); transition: 0.2s var(--ease);
    }
    #search-input:focus { border-color: var(--border-hi); background: #0c0c0c; }

    #recents {
      display: flex; gap: 6px; padding: 8px 12px;
      overflow-x: auto; flex-shrink: 0;
    }
    #recents::-webkit-scrollbar { display: none; }
    .chip {
      padding: 5px 12px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 100px; font-size: 10px; font-weight: 600; color: var(--text-dim);
      white-space: nowrap; cursor: pointer; transition: 0.2s var(--ease);
    }
    .chip:hover { background: var(--card); color: var(--text); border-color: var(--border-hi); }

    #list { flex: 1; overflow-y: auto; padding: 4px 8px; position: relative; }
    #list::-webkit-scrollbar { width: 0; }

    .srow {
      display: flex; align-items: center; padding: 10px 12px;
      border-radius: 10px; cursor: pointer; transition: background 0.1s var(--ease);
      margin-bottom: 2px; gap: 12px; border: 1px solid transparent;
    }
    .srow:hover { background: var(--card); border-color: var(--border); }
    .srow:active { transform: scale(0.985); }

    .srow.is-pinned { background: rgba(255,255,255,0.02); border-color: var(--border); }
    .s-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .s-pin { color: var(--text-mute); transition: 0.2s var(--ease); padding: 4px; border-radius: 4px; }
    .s-pin:hover { color: var(--text-dim); background: var(--panel); }
    .srow.is-pinned .s-pin { color: var(--accent); }

    .loader-overlay {
      position: absolute; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .loader-overlay.active { opacity: 0.8; pointer-events: all; }

    #empty { padding: 60px 20px; text-align: center; color: var(--text-mute); font-size: 12px; line-height: 1.6; }

    #footer {
      padding: 10px 16px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--panel); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-mute);
    }
    .status-wrap { display: flex; align-items: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.3); margin-right: 8px; transition: 0.3s; }
    .dot.busy { background: var(--warn); box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
  </style>
</head>
<body>
<div id="root">
  <div id="key-section">
    <div class="key-header">
      <div class="key-info">
        <span class="lbl">Session Remaining</span>
        <span id="exp-val" class="val">...</span>
        <span id="exp-sub" class="sub">Validating...</span>
      </div>
      <div class="rings">
        <div class="ring-box">
          <svg viewBox="0 0 48 48"><circle class="ring-track" cx="24" cy="24" r="20"/><circle class="ring-fill" id="ring-h" cx="24" cy="24" r="20" stroke-dasharray="125.7" stroke-dashoffset="125.7"/></svg>
          <div class="ring-label" id="ring-h-n">0</div>
        </div>
        <div class="ring-box">
          <svg viewBox="0 0 48 48"><circle class="ring-track" cx="24" cy="24" r="20"/><circle class="ring-fill" id="ring-d" cx="24" cy="24" r="20" stroke-dasharray="125.7" stroke-dashoffset="125.7"/></svg>
          <div class="ring-label" id="ring-d-n">0</div>
        </div>
      </div>
    </div>
    <div class="key-actions">
      <div id="key-display">...</div>
      <button class="act-btn" id="btn-copy" title="Copy Key">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button class="act-btn" id="btn-refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
      </button>
    </div>
  </div>

  <div id="search-container">
    <input type="text" id="search-input" placeholder="Search scripts..." spellcheck="false" autocomplete="off">
  </div>

  <div id="recents"></div>

  <div id="list">
    <div class="loader-overlay" id="list-loader">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="spinning" style="color:var(--text-mute)"><path d="M12 3a9 9 0 1 0 9 9"/></svg>
    </div>
    <div id="empty">No scripts found.</div>
  </div>

  <div id="footer">
    <div class="status-wrap"><div class="dot" id="status-dot"></div><span id="status">Ready</span></div>
    <div id="count">0 Items</div>
  </div>
</div>
<script src="popover.js"></script>
</body>
</html>
