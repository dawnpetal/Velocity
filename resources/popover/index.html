<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocity</title>
  <style>
    @font-face { font-family: "JB"; font-weight: 400; src: url("../fonts/JetBrainsMono-Regular.woff2") format("woff2"); }
    @font-face { font-family: "JB"; font-weight: 500; src: url("../fonts/JetBrainsMono-Medium.woff2") format("woff2"); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sans: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
      --mono: "JB", ui-monospace, monospace;
      --bg:   #0c0c0c;
      --bg1:  #161616;
      --bg2:  #1e1e1e;
      --bg3:  #242424;
      --line: #1f1f1f;
      --lo:   #2a2a2a;
      --hi:   #383838;
      --w:    #ffffff;
      --d1:   #888;
      --d2:   #555;
      --d3:   #333;
      --t:    80ms linear;
    }

    html, body {
      width: 270px; height: 320px;
      overflow: hidden; background: transparent;
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      user-select: none; -webkit-user-select: none;
    }

    #root {
      width: 270px; height: 320px;
      background: var(--bg);
      border: 1px solid var(--lo);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    #key-section { flex-shrink: 0; }
    #key-section.hidden { display: none; }

    #key-top {
      display: grid; grid-template-columns: 1fr auto;
      padding: 14px 14px 10px;
      gap: 10px;
      border-bottom: 1px solid var(--line);
    }

    .expires-block { display: flex; flex-direction: column; justify-content: center; }

    .lbl {
      font: 400 12px/1 var(--sans);
      color: var(--d1); margin-bottom: 4px;
    }

    #expires-value {
      font: 700 26px/1 var(--sans);
      letter-spacing: -0.03em; color: var(--w);
      font-variant-numeric: tabular-nums;
      transition: color 150ms;
    }
    #expires-value.warn  { color: var(--d1); }
    #expires-value.fail  { color: var(--d2); text-decoration: line-through; text-decoration-thickness: 2px; }
    #expires-value.stale { color: var(--d2); }

    #expires-sub {
      font: 400 9px/1 var(--sans);
      color: var(--d2); margin-top: 4px;
      min-height: 11px;
    }

    .rings-block { display: flex; gap: 8px; align-items: center; }

    .ring-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
    .ring-wrap svg { width: 52px; height: 52px; transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: var(--bg3); stroke-width: 5; }
    .ring-fill  {
      fill: none; stroke-width: 5; stroke-linecap: round; stroke: var(--w);
      transition: stroke-dashoffset 350ms cubic-bezier(0.4,0,0.2,1), stroke 150ms;
    }
    .ring-fill.warn { stroke: var(--d1); }

    .ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1px;
    }
    .ring-num { font: 700 14px/1 var(--sans); color: var(--w); letter-spacing: -0.02em; }
    .ring-sub { font: 400 7px/1 var(--sans); color: var(--d1); letter-spacing: 0.04em; text-transform: uppercase; }

    #key-bottom {
      display: flex; align-items: center;
      padding: 8px 10px; gap: 6px;
      border-bottom: 1px solid var(--line);
    }

    #key-value {
      flex: 1; min-width: 0;
      font: 500 9.5px/1 var(--mono);
      color: var(--d1); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      background: var(--bg1); border: 1px solid var(--lo);
      border-radius: 8px; padding: 6px 10px;
    }

    .ibtn {
      width: 30px; height: 30px;
      background: var(--bg2); border: 1px solid var(--lo);
      color: var(--d1); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; border-radius: 8px;
      transition: background var(--t), color var(--t), border-color var(--t);
    }
    .ibtn:hover  { background: var(--bg3); color: var(--w); border-color: var(--hi); }
    .ibtn:active { opacity: 0.5; transform: scale(0.95); }
    .ibtn svg    { width: 13px; height: 13px; }
    #btn-refresh.spinning svg { animation: spin 0.65s linear infinite; }
    #btn-copy.copied { color: var(--w); border-color: var(--hi); }
    @keyframes spin { to { transform: rotate(360deg); } }

    #run-header {
      display: flex; align-items: center;
      height: 26px; padding: 0 14px;
      flex-shrink: 0; border-bottom: 1px solid var(--line);
      gap: 6px;
    }
    #run-label { font: 600 10px/1 var(--sans); letter-spacing: 0.06em; text-transform: uppercase; color: var(--d2); flex: 1; }
    #run-count { font: 400 10px/1 var(--sans); color: var(--d3); }

    #scripts-scroll {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 3px 6px; min-height: 0;
    }
    #scripts-scroll::-webkit-scrollbar { width: 3px; }
    #scripts-scroll::-webkit-scrollbar-thumb { background: var(--lo); border-radius: 2px; }

    .srow {
      display: flex; align-items: center;
      height: 30px; padding: 0 8px;
      cursor: pointer; gap: 8px; border-radius: 8px;
      transition: background var(--t);
    }
    .srow:hover  { background: var(--bg1); }
    .srow:active { opacity: 0.6; }

    .sidx { font: 400 10px/1 var(--sans); color: var(--d3); width: 14px; text-align: right; flex-shrink: 0; }
    .smeta { flex: 1; min-width: 0; display: flex; align-items: center; gap: 7px; }
    .sname { font: 500 12px/1 var(--sans); color: var(--w); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .skbd { font: 400 9px/1 var(--mono); color: var(--d1); background: var(--bg2); border: 1px solid var(--lo); padding: 2px 4px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }

    .srun {
      width: 18px; height: 18px; background: transparent; border: none;
      color: var(--d2); cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; opacity: 0;
      transition: opacity var(--t), color var(--t); padding: 0; border-radius: 4px;
    }
    .srow:hover .srun { opacity: 1; }
    .srun:hover { color: var(--w); background: var(--bg2); }
    .srun svg { width: 8px; height: 8px; }

    #empty { font: 400 11px/2 var(--sans); color: var(--d2); text-align: center; padding: 18px 12px; display: none; }

    #footer {
      display: flex; align-items: center; justify-content: space-between;
      height: 34px; padding: 0 10px;
      border-top: 1px solid var(--line); flex-shrink: 0;
    }
    #footer-name { font: 600 11px/1 var(--sans); letter-spacing: 0.06em; text-transform: uppercase; color: var(--d2); }
    #btn-open {
      display: inline-flex; align-items: center; gap: 5px;
      font: 500 10px/1 var(--sans); letter-spacing: 0.04em;
      color: var(--d1); background: var(--bg2); border: 1px solid var(--lo);
      padding: 5px 10px; cursor: pointer; border-radius: 7px;
      transition: background var(--t), color var(--t), border-color var(--t);
    }
    #btn-open:hover  { background: var(--bg3); color: var(--w); border-color: var(--hi); }
    #btn-open:active { opacity: 0.5; }
    #btn-open svg { width: 9px; height: 9px; }
  </style>
</head>
<body>
<div id="root">

  <div id="key-section">
    <div id="key-top">
      <div class="expires-block">
        <span class="lbl">Expires in</span>
        <span id="expires-value">—</span>
        <span id="expires-sub"></span>
      </div>
      <div class="rings-block">
        <div class="ring-wrap">
          <svg viewBox="0 0 52 52">
            <circle class="ring-track" cx="26" cy="26" r="22"/>
            <circle class="ring-fill" id="ring-hour" cx="26" cy="26" r="22" stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
          </svg>
          <div class="ring-center">
            <span class="ring-num" id="ring-hour-num">0</span>
            <span class="ring-sub">/ hr</span>
          </div>
        </div>
        <div class="ring-wrap">
          <svg viewBox="0 0 52 52">
            <circle class="ring-track" cx="26" cy="26" r="22"/>
            <circle class="ring-fill" id="ring-day" cx="26" cy="26" r="22" stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
          </svg>
          <div class="ring-center">
            <span class="ring-num" id="ring-day-num">0</span>
            <span class="ring-sub">/ day</span>
          </div>
        </div>
      </div>
    </div>

    <div id="key-bottom">
      <span id="key-value">—</span>
      <button class="ibtn" id="btn-copy" title="Copy key">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
      <button class="ibtn" id="btn-refresh" title="Revalidate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="run-header">
    <span id="run-label">Quick Run</span>
    <span id="run-count"></span>
  </div>

  <div id="scripts-scroll">
    <div id="empty">No scripts yet.<br>Settings → Menu Bar</div>
  </div>

  <div id="footer">
    <span id="footer-name">Velocity</span>
    <button id="btn-open">
      Open
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </button>
  </div>

</div>
<script src="popover.js"></script>
</body>
</html>
